<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORA | Hub</title>
    <style>
        :root { --bg: #020617; --sky: #38bdf8; --card: #1e293b; }
        body { background: var(--bg); color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; }
        
        /* Header & Search */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #0f172a; position: sticky; top: 0; z-index: 10; }
        .search-bar { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px; color: white; width: 250px; outline: none; }
        .search-bar:focus { border-color: var(--sky); }

        /* Grid */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid transparent; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--sky); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 10px; }
        .card-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .type-badge { font-size: 10px; color: var(--sky); text-transform: uppercase; }

        /* Cinema View (Overlays the current page) */
        #cinema-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; overflow-y: auto; }
        .cinema-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; background: #0f172a; }
        .back-btn { background: var(--sky); border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .player-area { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .video-box { position: relative; padding-bottom: 56.25%; background: #000; border-radius: 12px; overflow: hidden; }
        iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { background: #334155; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn.active { background: var(--sky); color: #000; }
    </style>
</head>
<body>

<div id="library-view">
    <div class="header">
        <h1>SORA<span style="color:var(--sky)">.STREAM</span></h1>
        <input type="text" class="search-bar" id="searchInput" placeholder="Search..." onkeyup="filterContent()">
    </div>
    <div class="container">
        <div class="grid" id="animeGrid"></div>
    </div>
</div>

<div id="cinema-view">
    <div class="cinema-header">
        <button class="back-btn" onclick="closeCinema()">← LIBRARY</button>
        <h2 id="cinema-title" style="margin:0; font-size: 18px;"></h2>
    </div>
    <div class="player-area">
        <div class="video-box">
            <iframe id="main-player" allow="autoplay; fullscreen" referrerpolicy="no-referrer"></iframe>
        </div>
        <div class="controls">
            <button class="btn active" id="btn-sub" onclick="setLang('sub')">SUB (Original)</button>
            <button class="btn" id="btn-dub" onclick="setLang('dub')">DUB (English)</button>
            <span style="flex-grow:1"></span>
            <button class="btn" onclick="setServer(1)">Server 1</button>
            <button class="btn" onclick="setServer(2)">Server 2</button>
        </div>
    </div>
</div>

<script>
    // Verified Data for 2026
    const data = [
        { id: '372054', title: 'Your Name', type: 'movie', img: 'q719jXXLsVp68uUFWw9ptmEMQgy.jpg' },
        { id: '378064', title: 'A Silent Voice', type: 'movie', img: 'tuFaR0v40vI6N1p6T7At0A9df6A.jpg' },
        { id: '568160', title: 'Weathering With You', type: 'movie', img: '7cn96S799UvYv9S696S66O97vI8.jpg' },
        { id: '61663', title: 'Your Lie in April', type: 'tv', img: 'igt8S9799UvYv9S696S66O97vI8.jpg' },
        { id: '504253', title: 'I Want to Eat Your Pancreas', type: 'movie', img: 'v0S6LzOndN8dYn7b6W6O97vI8.jpg' },
        { id: '105248', title: 'Cyberpunk Edgerunners', type: 'tv', img: '7j8S9799UvYv9S696S66O97vI8.jpg' },
        { id: '1398', title: 'Death Note', type: 'tv', img: 'o9S9799UvYv9S696S66O97vI8.jpg' },
        { id: '94664', title: 'My Dress-Up Darling', type: 'tv', img: '9n5Yp7vNnO8F2T5Q6U9M1H5B6X.jpg' },
        { id: '235252', title: 'DAN DA DAN', type: 'tv', img: '6U9M1H5B6X8C9N6S799UvYv9S6.jpg' }
    ];

    let currentItem = null;
    let lang = 'sub';
    let server = 1;

    function render(list) {
        document.getElementById('animeGrid').innerHTML = list.map(item => `
            <div class="card" onclick="openCinema('${item.id}')">
                <img src="https://image.tmdb.org/t/p/w500/${item.img}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Poster'">
                <div class="card-info">
                    <div class="type-badge">${item.type}</div>
                    <div class="card-title">${item.title}</div>
                </div>
            </div>
        `).join('');
    }

    function openCinema(id) {
        currentItem = data.find(i => i.id === id);
        document.getElementById('cinema-title').innerText = currentItem.title;
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('cinema-view').style.display = 'block';
        updatePlayer();
    }

    function closeCinema() {
        document.getElementById('main-player').src = '';
        document.getElementById('cinema-view').style.display = 'none';
        document.getElementById('library-view').style.display = 'block';
    }

    function updatePlayer() {
        if (!currentItem) return;
        const frame = document.getElementById('main-player');
        
        // Logic: Movies use /movie/, Series use /tv/
        // Dub Logic: Server 1 (vidsrc.me) uses ?ds_lang=en for English subtitles/audio where available
        let baseUrl = server === 1 ? 'https://vidsrc.me/embed/' : 'https://vidsrc.xyz/embed/';
        let url = `${baseUrl}${currentItem.type}?tmdb=${currentItem.id}`;
        
        if (lang === 'dub') url += "&ds_lang=en";
        
        frame.src = url;
    }

    function setLang(l) {
        lang = l;
        document.getElementById('btn-sub').classList.toggle('active', l === 'sub');
        document.getElementById('btn-dub').classList.toggle('active', l === 'dub');
        updatePlayer();
    }

    function setServer(s) {
        server = s;
        updatePlayer();
    }

    function filterContent() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(data.filter(i => i.title.toLowerCase().includes(q)));
    }

    render(data);
</script>
</body>
</html>
