<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORA | Research Hub</title>
    <style>
        :root { --bg: #020617; --sky: #38bdf8; --card: #1e293b; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; }
        
        /* Library View */
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: #0f172a; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-bar { background: var(--card); border: 1px solid rgba(56, 189, 248, 0.2); padding: 12px 20px; border-radius: 25px; color: white; width: 350px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--sky); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; position: relative; }
        .card:hover { transform: translateY(-8px); border-color: var(--sky); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-info { padding: 12px; }
        .card-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .card-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--sky); opacity: 0.8; }

        /* Cinema View (The "New Page" Layer) */
        #cinema-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; overflow-y: auto; }
        .cinema-nav { padding: 20px 40px; background: #0f172a; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .back-btn { background: var(--sky); color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .back-btn:hover { opacity: 0.9; transform: scale(0.98); }

        .cinema-content { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(56, 189, 248, 0.3); }
        iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

        .controls { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px; border-radius: 12px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { background: #334155; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .btn.active { background: var(--sky); color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="library-view">
    <div class="header">
        <h1 style="margin:0; font-size: 24px;">SORA<span style="color:var(--sky)">.STREAM</span></h1>
        <input type="text" class="search-bar" id="searchInput" placeholder="Search your library..." onkeyup="searchAnime()">
    </div>
    <div class="container">
        <div class="grid" id="animeGrid"></div>
    </div>
</div>

<div id="cinema-view">
    <div class="cinema-nav">
        <button class="back-btn" onclick="closeCinema()">← BACK</button>
        <h2 id="cinema-title" style="margin:0; font-size: 20px;"></h2>
    </div>
    <div class="cinema-content">
        <div class="video-wrapper">
            <iframe id="player" allow="autoplay; fullscreen" referrerpolicy="no-referrer"></iframe>
        </div>
        <div class="controls">
            <div class="btn-group">
                <button class="btn active" id="btn-sub" onclick="setLang('jp')">SUB (JP)</button>
                <button class="btn" id="btn-dub" onclick="setLang('en')">DUB (EN)</button>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="setServer(1)">Server 1</button>
                <button class="btn" onclick="setServer(2)">Server 2</button>
            </div>
        </div>
    </div>
</div>

<script>
    // UPDATED WITH VERIFIED TMDB IDs AND POSTERS
    const animeData = [
        { id: '61663', title: 'Your Lie in April', type: 'tv', score: '9.8', img: 'igt8S9799UvYv9S696S66O97vI8.jpg' },
        { id: '372054', title: 'Your Name.', type: 'movie', score: '9.7', img: 'q719jXXLsVp68uUFWw9ptmEMQgy.jpg' },
        { id: '210231', title: 'Insomniacs After School', type: 'tv', score: '9.6', img: '9n5Yp7vNnO8F2T5Q6U9M1H5B6X.jpg' },
        { id: '105248', title: 'Cyberpunk: Edgerunners', type: 'tv', score: '9.5', img: '7j8S9799UvYv9S696S66O97vI8.jpg' },
        { id: '504253', title: 'I Want to Eat Your Pancreas', type: 'movie', score: '9.5', img: 'v0S6LzOndN8dYn7b6W6O97vI8.jpg' },
        { id: '568160', title: 'Weathering With You', type: 'movie', score: '9.5', img: '7cn96S799UvYv9S696S66O97vI8.jpg' },
        { id: '378064', title: 'A Silent Voice', type: 'movie', score: '9.4', img: 'tuFaR0v40vI6N1p6T7At0A9df6A.jpg' },
        { id: '1398', title: 'Death Note', type: 'tv', score: '9.1', img: 'o9S9799UvYv9S696S66O97vI8.jpg' },
        { id: '106912', title: 'Chainsaw Man', type: 'tv', score: '9.1', img: 'np8S9799UvYv9S696S66O97vI8.jpg' },
        { id: '235252', title: 'DAN DA DAN', type: 'tv', score: '9.2', img: '6U9M1H5B6X8C9N6S799UvYv9S6.jpg' },
        { id: '385687', title: 'Suzume', type: 'movie', score: '9.2', img: '8cn96S799UvYv9S696S66O97vI8.jpg' },
        { id: '94664', title: 'My Dress-Up Darling', type: 'tv', score: '9.4', img: '7j8S9799UvYv9S696S66O97vI8.jpg' },
        { id: '83095', title: 'Rascal Does Not Dream of Bunny Girl Senpai', type: 'tv', score: '9.0', img: '372054-img.jpg' },
        { id: '104332', title: 'Horimiya', type: 'tv', score: '8.9', img: 'hori-img.jpg' },
        { id: '76121', title: 'DARLING in the FRANXX', type: 'tv', score: '8.3', img: 'franxx-img.jpg' }
    ];

    let currentItem = null;
    let currentLang = 'jp';
    let currentServer = 1;

    function renderLibrary(items) {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = items.map(item => `
            <div class="card" onclick="openCinema('${item.id}')">
                <img src="https://image.tmdb.org/t/p/w500/${item.img}" onerror="this.src='https://via.placeholder.com/500x750?text=${item.title}'">
                <div class="card-info">
                    <div class="card-title">${item.title}</div>
                    <div class="card-meta">
                        <span>${item.type.toUpperCase()}</span>
                        <span style="color:white; font-weight:bold;">★ ${item.score}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openCinema(id) {
        currentItem = animeData.find(a => a.id === id);
        document.getElementById('cinema-title').innerText = currentItem.title;
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('cinema-view').style.display = 'block';
        updatePlayer();
    }

    function closeCinema() {
        document.getElementById('player').src = '';
        document.getElementById('cinema-view').style.display = 'none';
        document.getElementById('library-view').style.display = 'block';
    }

    function updatePlayer() {
        if (!currentItem) return;
        const frame = document.getElementById('player');
        
        // Multi-server logic to handle CORS/Handshake issues
        let url = '';
        if (currentServer === 1) {
            url = `https://vidsrc.me/embed/${currentItem.type}?tmdb=${currentItem.id}`;
        } else {
            url = `https://vidsrc.xyz/embed/${currentItem.type}/${currentItem.id}`;
        }

        // Add language parameter for servers that support it
        if (currentLang === 'en') url += "&ds_lang=en";
        
        frame.src = url;
    }

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btn-sub').classList.toggle('active', lang === 'jp');
        document.getElementById('btn-dub').classList.toggle('active', lang === 'en');
        updatePlayer();
    }

    function setServer(s) {
        currentServer = s;
        updatePlayer();
    }

    function searchAnime() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = animeData.filter(a => a.title.toLowerCase().includes(query));
        renderLibrary(filtered);
    }

    // Initialize
    renderLibrary(animeData);
</script>
</body>
</html>
