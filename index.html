<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORA | Hub</title>
    <style>
        :root { --bg: #020617; --glass: rgba(30, 41, 59, 0.7); --sky: #38bdf8; --card: #1e293b; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Layout */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-bar { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px; color: white; width: 300px; outline: none; }
        .search-bar:focus { border-color: var(--sky); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid transparent; }
        .card:hover { transform: scale(1.05); border-color: var(--sky); z-index: 2; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 10px; font-size: 14px; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--sky); color: #000; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 10px; }

        /* Cinema View (The "New Page" feel) */
        #cinema-view { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 100; overflow-y: auto; }
        .cinema-nav { padding: 20px; display: flex; align-items: center; gap: 20px; }
        .back-btn { background: var(--sky); color: black; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .video-container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .video-box { position: relative; padding-bottom: 56.25%; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 0 50px rgba(56, 189, 248, 0.2); }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .player-controls { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 10px; }
        .toggle-btn { background: #334155; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .toggle-btn.active { background: var(--sky); color: black; }
    </style>
</head>
<body>

<div id="library-view">
    <div class="header">
        <h1>SORA<span style="color:var(--sky)">.STREAM</span></h1>
        <input type="text" class="search-bar" id="searchInput" placeholder="Search anime..." onkeyup="filterAnime()">
    </div>
    <div class="container">
        <div class="grid" id="animeGrid"></div>
    </div>
</div>

<div id="cinema-view">
    <div class="cinema-nav">
        <button class="back-btn" onclick="closeCinema()">← BACK TO LIBRARY</button>
        <h2 id="cinema-title"></h2>
    </div>
    <div class="video-container">
        <div class="video-box">
            <iframe id="main-player" allow="autoplay; fullscreen" referrerpolicy="no-referrer"></iframe>
        </div>
        <div class="player-controls">
            <div class="btn-group">
                <button class="toggle-btn active" id="btn-sub" onclick="setMode('jp')">SUB (JP)</button>
                <button class="toggle-btn" id="btn-dub" onclick="setMode('en')">DUB (EN)</button>
            </div>
            <div class="btn-group">
                <button class="toggle-btn" onclick="switchServer(1)">Server 1</button>
                <button class="toggle-btn" onclick="switchServer(2)">Server 2</button>
            </div>
        </div>
    </div>
</div>

<script>
    const animeList = [
        { id: '372054', title: 'Your Name', score: '9.7', type: 'Movie', img: 'q719jXXLsVp68uUFWw9ptmEMQgy' },
        { id: '378064', title: 'A Silent Voice', score: '9.4', type: 'Movie', img: 'tuFaR0v40vI6N1p6T7At0A9df6A' },
        { id: '568160', title: 'Weathering With You', score: '9.5', type: 'Movie', img: '7cn96S799UvYv9S696S66O97vI8' },
        { id: '90660', title: 'Your Lie in April', score: '9.8', type: 'TV', img: 'igt8S9799UvYv9S696S66O97vI8' },
        { id: '45533', title: 'I Want to Eat Your Pancreas', score: '9.5', type: 'Movie', img: 'v0S6LzOndN8dYn7b6W6O97vI8' },
        { id: '92321', title: 'Cyberpunk Edgerunners', score: '9.5', type: 'ONA', img: '7j8S9799UvYv9S696S66O97vI8' },
        { id: '385687', title: 'Suzume', score: '9.2', type: 'Movie', img: '8cn96S799UvYv9S696S66O97vI8' },
        { id: '106912', title: 'Chainsaw Man', score: '9.1', type: 'TV', img: 'np8S9799UvYv9S696S66O97vI8' },
        { id: '1100', title: 'Death Note', score: '9.1', type: 'TV', img: 'o9S9799UvYv9S696S66O97vI8' }
        // Add all other titles following this pattern
    ];

    let currentId = '';
    let currentMode = 'jp'; // default to sub
    let currentServer = 1;

    function renderLibrary(list) {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = list.map(anime => `
            <div class="card" onclick="openCinema('${anime.id}', '${anime.title}', '${anime.type}')">
                <div class="badge">${anime.score}</div>
                <img src="https://image.tmdb.org/t/p/w500/${anime.img}.jpg" alt="${anime.title}">
                <div class="card-info">
                    <strong>${anime.title}</strong><br>
                    <span style="color:var(--sky); font-size:12px;">${anime.type}</span>
                </div>
            </div>
        `).join('');
    }

    function openCinema(id, title, type) {
        currentId = id;
        document.getElementById('cinema-title').innerText = title;
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('cinema-view').style.display = 'block';
        updatePlayer();
    }

    function closeCinema() {
        document.getElementById('main-player').src = '';
        document.getElementById('cinema-view').style.display = 'none';
        document.getElementById('library-view').style.display = 'block';
    }

    function updatePlayer() {
        const frame = document.getElementById('main-player');
        // Mode logic: vidsrc-embed.ru uses ds_lang for subs. 
        // For dubs, many servers require switching to a different ID or using 'en' parameter
        let langParam = (currentMode === 'en') ? '&ds_lang=en' : '&ds_lang=jp';
        
        if(currentServer === 1) frame.src = `https://vidsrc.me/embed/movie?tmdb=${currentId}${langParam}`;
        if(currentServer === 2) frame.src = `https://vidsrc-embed.ru/embed/movie/${currentId}?autoplay=1${langParam}`;
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-sub').classList.toggle('active', mode === 'jp');
        document.getElementById('btn-dub').classList.toggle('active', mode === 'en');
        updatePlayer();
    }

    function switchServer(s) {
        currentServer = s;
        updatePlayer();
    }

    function filterAnime() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = animeList.filter(a => a.title.toLowerCase().includes(query));
        renderLibrary(filtered);
    }

    // Initial Load
    renderLibrary(animeList);
</script>
</body>
</html>
