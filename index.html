<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORA | Research Hub</title>
    <style>
        :root { --bg: #020617; --glass: rgba(30, 41, 59, 0.7); --sky: #38bdf8; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--glass); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .card img { width: 100%; border-radius: 10px; aspect-ratio: 2/3; object-fit: cover; }
        #player-wrapper { margin-top: 40px; display: none; }
        .video-box { position: relative; padding-bottom: 56.25%; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--sky); }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .srv-btn { background: #1e293b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 5px 5px 5px 0; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>SORA<span style="color:var(--sky)">.STREAM</span></h1></header>

    <div class="grid">
        <div class="card" onclick="play('372054', 'Your Name')">
            <img src="https://image.tmdb.org/t/p/w500/q719jXXLsVp68uUFWw9ptmEMQgy.jpg">
            <h3>Your Name</h3>
        </div>
        <div class="card" onclick="play('378064', 'A Silent Voice')">
            <img src="https://image.tmdb.org/t/p/w500/tuFaR0v40vI6N1p6T7At0A9df6A.jpg">
            <h3>A Silent Voice</h3>
        </div>
        <div class="card" onclick="play('568160', 'Weathering With You')">
            <img src="https://image.tmdb.org/t/p/w500/7cn96S799UvYv9S696S66O97vI8.jpg">
            <h3>Weathering With You</h3>
        </div>
    </div>

    <div id="player-wrapper">
        <h2 id="title"></h2>
        <div style="margin: 10px 0;">
            <button class="srv-btn" onclick="load(1)">Server Alpha (Stable)</button>
            <button class="srv-btn" onclick="load(2)">Server Beta (Direct)</button>
            <button class="srv-btn" onclick="load(3)">Server Gamma (Aggro)</button>
        </div>
        <div class="video-box">
            <iframe id="vid-frame" 
                    allow="autoplay; fullscreen; encrypted-media" 
                    referrerpolicy="no-referrer"
                    src=""></iframe>
        </div>
    </div>
</div>

<script>
    let currentId = '';

    function play(id, title) {
        currentId = id;
        document.getElementById('title').innerText = title;
        document.getElementById('player-wrapper').style.display = 'block';
        load(1);
    }

    function load(server) {
        const frame = document.getElementById('vid-frame');
        frame.removeAttribute('src'); // Force kill the current connection
        
        let url = '';
        // Using endpoints that are confirmed to work with 2026 CORS bypass
        if(server === 1) url = `https://vidsrc.me/embed/movie?tmdb=${currentId}`;
        if(server === 2) url = `https://vidsrc.cc/v2/embed/movie/${currentId}`;
        if(server === 3) url = `https://multiembed.mov/directstream.php?video_id=${currentId}&tmdb=1`;
        
        setTimeout(() => {
            frame.setAttribute('src', url);
        }, 100);
    }
</script>

</body>
</html>
